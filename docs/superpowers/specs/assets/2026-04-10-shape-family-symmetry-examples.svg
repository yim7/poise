<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">shape_family 对称示意图</title>
  <desc id="desc">左图展示 linear、inertial、responsive 围绕价格带中点对称。右图展示 long 和 short 配置只会把同一条基准曲线整体上移或下移。</desc>
  <rect width="1280" height="620" fill="#faf9f4"/>

  <text x="60" y="52" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="30" fill="#111111">shape_family 对称示意图</text>
  <text x="60" y="84" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555">左图是围绕中点对称的曲线，右图是同一条基准曲线随 long/short 整体上移或下移。</text>

  <text x="70" y="122" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#111111">对称的 shape_family</text>
  <text x="690" y="122" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="22" fill="#111111">偏移是纵向平移</text>

  <!-- Left panel -->
  <g transform="translate(0,0)">
    <rect x="70" y="140" width="500" height="380" rx="10" fill="#ffffff" stroke="#d9d7cf"/>
    <line x1="120" y1="180" x2="120" y2="480" stroke="#333333" stroke-width="3"/>
    <line x1="120" y1="330" x2="520" y2="330" stroke="#999999" stroke-width="1.5" stroke-dasharray="7 7"/>
    <line x1="120" y1="480" x2="520" y2="480" stroke="#333333" stroke-width="3"/>
    <line x1="320" y1="180" x2="320" y2="480" stroke="#777777" stroke-width="1.5" stroke-dasharray="7 7"/>

    <line x1="220" y1="180" x2="220" y2="480" stroke="#eceae2" stroke-width="1"/>
    <line x1="420" y1="180" x2="420" y2="480" stroke="#eceae2" stroke-width="1"/>
    <line x1="120" y1="255" x2="520" y2="255" stroke="#eceae2" stroke-width="1"/>
    <line x1="120" y1="405" x2="520" y2="405" stroke="#eceae2" stroke-width="1"/>

    <polyline points="120.0,180.0 130.0,187.5 140.0,195.0 150.0,202.5 160.0,210.0 170.0,217.5 180.0,225.0 190.0,232.5 200.0,240.0 210.0,247.5 220.0,255.0 230.0,262.5 240.0,270.0 250.0,277.5 260.0,285.0 270.0,292.5 280.0,300.0 290.0,307.5 300.0,315.0 310.0,322.5 320.0,330.0 330.0,337.5 340.0,345.0 350.0,352.5 360.0,360.0 370.0,367.5 380.0,375.0 390.0,382.5 400.0,390.0 410.0,397.5 420.0,405.0 430.0,412.5 440.0,420.0 450.0,427.5 460.0,435.0 470.0,442.5 480.0,450.0 490.0,457.5 500.0,465.0 510.0,472.5 520.0,480.0" fill="none" stroke="#1f77b4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="120.0,180.0 130.0,182.5 140.0,185.2 150.0,187.9 160.0,190.8 170.0,193.7 180.0,196.8 190.0,200.1 200.0,203.5 210.0,207.1 220.0,210.9 230.0,215.1 240.0,219.5 250.0,224.3 260.0,229.6 270.0,235.5 280.0,242.3 290.0,250.3 300.0,260.4 310.0,274.7 320.0,330.0 330.0,385.3 340.0,399.6 350.0,409.7 360.0,417.7 370.0,424.5 380.0,430.4 390.0,435.7 400.0,440.5 410.0,444.9 420.0,449.1 430.0,452.9 440.0,456.5 450.0,459.9 460.0,463.2 470.0,466.3 480.0,469.2 490.0,472.1 500.0,474.8 510.0,477.5 520.0,480.0" fill="none" stroke="#2ca02c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="120.0,180.0 130.0,201.4 140.0,220.6 150.0,237.9 160.0,253.2 170.0,266.7 180.0,278.6 190.0,288.8 200.0,297.6 210.0,305.0 220.0,311.2 230.0,316.3 240.0,320.4 250.0,323.6 260.0,325.9 270.0,327.7 280.0,328.8 290.0,329.5 300.0,329.9 310.0,330.0 320.0,330.0 330.0,330.0 340.0,330.1 350.0,330.5 360.0,331.2 370.0,332.3 380.0,334.1 390.0,336.4 400.0,339.6 410.0,343.7 420.0,348.8 430.0,355.0 440.0,362.4 450.0,371.2 460.0,381.4 470.0,393.3 480.0,406.8 490.0,422.1 500.0,439.3 510.0,458.6 520.0,480.0" fill="none" stroke="#d62728" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="120" cy="180" r="5" fill="#333333"/>
    <circle cx="320" cy="330" r="5" fill="#333333"/>
    <circle cx="520" cy="480" r="5" fill="#333333"/>

    <text x="92" y="186" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">+1</text>
    <text x="98" y="336" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">0</text>
    <text x="92" y="486" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">-1</text>

    <text x="120" y="548" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555" text-anchor="middle">下沿</text>
    <text x="320" y="548" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555" text-anchor="middle">中点</text>
    <text x="520" y="548" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555" text-anchor="middle">上沿</text>

    <text x="142" y="168" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#2ca02c">inertial：回到中点更慢</text>
    <text x="328" y="214" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#d62728">responsive：回到中点更快</text>
    <text x="350" y="310" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1f77b4">linear</text>
  </g>

  <!-- Right panel -->
  <g transform="translate(0,0)">
    <rect x="690" y="140" width="500" height="380" rx="10" fill="#ffffff" stroke="#d9d7cf"/>
    <line x1="740" y1="180" x2="740" y2="480" stroke="#333333" stroke-width="3"/>
    <line x1="740" y1="330" x2="1140" y2="330" stroke="#999999" stroke-width="1.5" stroke-dasharray="7 7"/>
    <line x1="740" y1="480" x2="1140" y2="480" stroke="#333333" stroke-width="3"/>
    <line x1="940" y1="180" x2="940" y2="480" stroke="#777777" stroke-width="1.5" stroke-dasharray="7 7"/>

    <line x1="840" y1="180" x2="840" y2="480" stroke="#eceae2" stroke-width="1"/>
    <line x1="1040" y1="180" x2="1040" y2="480" stroke="#eceae2" stroke-width="1"/>
    <line x1="740" y1="255" x2="1140" y2="255" stroke="#eceae2" stroke-width="1"/>
    <line x1="740" y1="405" x2="1140" y2="405" stroke="#eceae2" stroke-width="1"/>

    <path d="M740 118 L940 330 L1140 422" fill="none" stroke="#1f77b4" stroke-width="4"/>
    <path d="M740 80 L940 292 L1140 384" fill="none" stroke="#c98a00" stroke-width="4"/>
    <path d="M740 156 L940 368 L1140 460" fill="none" stroke="#6f42c1" stroke-width="4"/>

    <circle cx="740" cy="118" r="5" fill="#1f77b4"/>
    <circle cx="940" cy="330" r="5" fill="#1f77b4"/>
    <circle cx="1140" cy="422" r="5" fill="#1f77b4"/>

    <text x="712" y="86" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">+10</text>
    <text x="712" y="124" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">+8</text>
    <text x="712" y="162" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">+6</text>
    <text x="718" y="298" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">+2</text>
    <text x="718" y="336" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">0</text>
    <text x="718" y="374" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">-2</text>
    <text x="712" y="390" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">-6</text>
    <text x="712" y="428" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">-8</text>
    <text x="706" y="466" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#555555" text-anchor="end">-10</text>

    <text x="740" y="548" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555" text-anchor="middle">下沿</text>
    <text x="940" y="548" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555" text-anchor="middle">中点</text>
    <text x="1140" y="548" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555" text-anchor="middle">上沿</text>

    <text x="815" y="76" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#c98a00">long=10 short=6</text>
    <text x="975" y="322" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#1f77b4">long=8 short=8</text>
    <text x="920" y="452" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#6f42c1">long=6 short=10</text>

    <text x="820" y="210" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555">同一条基准曲线</text>
    <text x="820" y="235" font-family="'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" fill="#555555">整体上移或下移</text>
  </g>
</svg>
